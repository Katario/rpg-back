  # ── Build & push images ───────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    # needs: test  # TODO: décommenter quand les tests passent

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner (lowercase)
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push rpg-back-php
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          target: php-production
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/rpg-back-php:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/rpg-back-php:${{ github.sha }}
          cache-from: type=gha,scope=back-php
          cache-to: type=gha,mode=max,scope=back-php

      - name: Build & push rpg-back-nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          target: nginx-production
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/rpg-back-nginx:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/rpg-back-nginx:${{ github.sha }}
          # Partage le cache du builder avec le job php (même Dockerfile, même stages amont)
          cache-from: type=gha,scope=back-php
          cache-to: type=gha,mode=max,scope=back-nginx

  # ── Déploiement VPS ───────────────────────────────────────────────────────
  deploy:
    name: Déploiement VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose -f compose.prod.yml pull back-php back-nginx
            docker compose -f compose.prod.yml up -d --no-deps back-php back-nginx
            docker image prune -f
