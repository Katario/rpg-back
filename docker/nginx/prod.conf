server {
    listen 80;
    server_name _;

    root /var/www/app/public;
    index index.php index.html;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # Fichiers statiques servis directement par Nginx (CSS, JS, images…)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Requêtes PHP transmises à PHP-FPM (service back-php dans compose.prod.yml)
    location ~ \.php$ {
        fastcgi_pass back-php:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Pas d'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
